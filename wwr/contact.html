<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Whitewater Rafting</title>
    <meta name="description"
      content="Contact us for support, inquiries, or feedback. Reach out anytime—we’re here to help you quickly and efficiently with any questions you have.">
    <meta name="author" content="Cielo Mariamne Rivera Charaña">
    <link rel="stylesheet" href="styles/contact.css">
</head>

<body>
    <header>
        <img src="images/z-rapids-trees.jpg" alt="Whitewater Rafting logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="contact-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main RIver Street</p>
            <p>Kolob, California</p>
            <p>ino@whitewater.com</p>
        </div>

        <section class="grid">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3827.5110182415133!2d-71.5394923252574!3d-16.39885313812866!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x91424a59ffae2999%3A0xc419f49d1f9cd270!2sPlaza%20de%20Armas%20Arequipa!5e0!3m2!1sen!2spe!4v1775931381676!5m2!1sen!2spe"
                  width="400" height="300" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <!-- <h2>Get in Touch!</h2> -->
            <form class="grid">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Sabrina Carpio">


                <label for="useremail">Email</label>
                <input type="email" id="useremail" name="useremail" placeholder="user@user.com">

                <div class="message grid">
                    <p>Message Purpose</p>
                    <label><input type="radio" id="o1" name="o">General Inquiry</label>
                    <label><input type="radio" id="o2" name="o">Reservation Question</label>
                    <label><input type="radio" id="o3" name="o">Website Suggestion</label>
                </div>

                <label class="message" for="message">Message</label>
                <textarea class="message" id="message" name="message"></textarea>

                <label class="message"><input type="checkbox" id="o1" name="o1">Please Subscribe me
                    to the
                    monthly newsletter</label>

                <button class="message" type="submit">Get in Touch!</button>
            </form>
        </section>

        <section class="flex">
            <h2>We Are Here to Serve You</h2>

            <figure>
                <img src="images/emply1.jpg" alt="Employee 1">
                <figcaption>Employee 1</figcaption>
            </figure>
            <figure>
                <img src="images/emply2.jpg" alt="Employee 2">
                <figcaption>Employee 2</figcaption>
            </figure>
            <figure>
                <img src="images/emply3.jpg" alt="Employee 3">
                <figcaption>Employee 3</figcaption>
            </figure>

        </section>
    </main>

    <footer>
        <p>©2026 🌊 Whitewater Rafting 🌊 Cielo Rivera</p>
        <nav class="socialmedia">
            <a href="https://www.instagram.com/">
                <img src="images/instagram-bw.svg" alt="Instagram Icon">
            </a>
            <a href="https://www.facebook.com/">
                <img src="images/facebook-bw.svg" alt="Facebook Icon">
            </a>
            <a href="https://www.tiktok.com/">
                <img src="images/tictok-bw.svg" alt="TickTock Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
