<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 HTML Form | User Poll</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>

    <header>

    </header>

    <main>
        <h1>WDD 130 HTML Form | User Poll</h1>
        <form>
            <h2>Contact information</h2>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="useremail">Email:</label>
            <input type="email" id="useremail" name="useremail" required>

            <h2>Questions</h2>
            <label for="browser">What is your favorite browser?</label>
            <select name="browser" id="browser">
                <option value="chrome">Chrome</option>
                <option value="safari">Safari</option>
                <option value="edge">Edge</option>
                <option value="other">Other</option>
            </select>

            <label><input type="checkbox" id="pet" name="pet">Do you havea household pet?</label>

            <label for="feedback">List the places you have lived.</label>
            <textarea id="feedback" name="feedback" rows="4"
              placeholder="Arequipa(Peru), Buenos Aires(Argentina)."></textarea>

            <button type="submit">Submit Poll</button>
        </form>
    </main>

    <footer>
        <p>@2026 | HTML Form - User Poll Activity | Cielo Rivera</p>
    </footer>

</body>

</html>
